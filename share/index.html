    <section class="pt-32 pb-16 max-w-6xl mx-auto px-6">

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <h2 class="text-2xl font-bold text-white"><span class="icon-pulse">📊</span> <span class="glow-text">Share Calculator</span></h2>
                    
                    <div class="flex items-center gap-3">
                        <button @click="clearFields()" 
                                class="px-4 py-2 border border-slate-700 rounded-xl text-[10px] font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all uppercase tracking-widest">
                            Clear
                        </button>

                        <div class="relative flex bg-[#1e293b] p-1 rounded-xl border border-slate-700 overflow-hidden">
                            <span class="absolute inset-y-1 left-1 w-[calc(50%-0.25rem)] rounded-lg bg-blue-600 shadow-lg transition-all duration-300 ease-out"
                                  :class="mode === 'sell' ? 'translate-x-full' : 'translate-x-0'"></span>
                            <button @click="mode = 'buy'" 
                                    :class="mode === 'buy' ? 'text-white' : 'text-slate-500'" 
                                    class="relative z-10 px-6 py-2 rounded-lg text-xs font-bold transition-all duration-300">BUY</button>
                            <button @click="mode = 'sell'" 
                                    :class="mode === 'sell' ? 'text-white' : 'text-slate-500'" 
                                    class="relative z-10 px-6 py-2 rounded-lg text-xs font-bold transition-all duration-300">SELL</button>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div>
                        <label class="label-text">Quantity</label>
                        <input type="number" x-model.number="qty" placeholder="0" class="input-field">
                    </div>

                    <div x-cloak x-show="mode === 'sell'"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 translate-y-3"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         x-transition:leave="transition ease-in duration-200"
                         x-transition:leave-start="opacity-100 translate-y-0"
                         x-transition:leave-end="opacity-0 translate-y-3">
                        <label class="label-text">Investor Type</label>
                        <select x-model="holding" class="input-field">
                            <option value="long">Individual: More than 1 Year (7.5%)</option>
                            <option value="short">Individual: Less than 1 Year (10%)</option>
                            <option value="institutional">Institutional (10%)</option>
                        </select>
                    </div>

                    <div>
                        <label class="label-text">Share Type</label>
                        <select x-model="shareType" class="input-field">
                            <option value="IPO">IPO</option>
                            <option value="FPO">FPO</option>
                            <option value="Secondary">Secondary</option>
                            <option value="Right">Right</option>
                            <option value="Bonus">Bonus</option>
                            <option value="Auction">Auction</option>
                        </select>
                    </div>

                    <div>
                        <label class="label-text">Purchase Price Per Unit (Rs)</label>
                        <input type="number" x-model.number="buyPrice" placeholder="0.00" class="input-field">
                    </div>

                    <div class="md:col-span-2" x-cloak x-show="mode === 'sell'"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 translate-y-3"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         x-transition:leave="transition ease-in duration-200"
                         x-transition:leave-start="opacity-100 translate-y-0"
                         x-transition:leave-end="opacity-0 translate-y-3">
                        <label class="label-text">Sell Price Per Unit (Rs)</label>
                        <input type="number" x-model.number="sellPrice" placeholder="0.00" class="input-field">
                    </div>
                </div>
            </div>

            <div x-cloak class="bg-gradient-to-br from-blue-600 to-indigo-900 p-8 rounded-[2rem] shadow-2xl space-y-6 fade-up reveal-on-scroll">
                <h3 class="font-bold border-b border-white/20 pb-4 text-white">Detailed Breakdown</h3>
                
                <div class="space-y-4 text-xs">
                    <template x-if="mode === 'buy'">
    <div x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-2">
        <div class="text-white/40 uppercase tracking-widest font-bold text-[10px] mb-2">
            Buy Side
        </div>

        <div class="space-y-2">

            </div>

                <span>Commission</span>

            </div>

            <div class="flex justify-between text-white/80">
                <span>SEBON Fee</span>
                <span x-text="'Rs ' + results.buySebon"></span>
            </div>
 <div class="flex justify-between text-white/80"><span>DP Charge</span><span x-text="'Rs ' + results.dp"></span></div>

            <div class="flex justify-between text-white font-bold text-sm pt-1">
                <span>Total Investment</span>
                <span x-text="'Rs ' + results.wacc"></span>
            </div>
        </div>
    </div>
</template>
                
                    <template x-if="mode === 'sell'">

                                <div class="flex justify-between text-white/80"><span>Share Type</span><span x-text="shareType"></span></div>
                                <div class="flex justify-between text-white/80"><span>Commission</span><span x-text="'Rs ' + results.sellComm"></span></div>
                                <div class="flex justify-between text-white/80"><span>SEBON Fee</span><span x-text="'Rs ' + results.sellSebon"></span></div>
                                <div class="flex justify-between text-white/80"><span>DP Charge</span><span x-text="'Rs ' + results.dp"></span></div>

                    <div class="space-y-3 text-sm text-slate-300">
                        <details class="rounded-xl border border-slate-700/80 bg-slate-800/60 p-4 reveal-on-scroll">
                            <summary class="cursor-pointer font-medium text-white" x-text="isNepali ? 'यो क्याल्कुलेटर केका लागि प्रयोग गरिन्छ?' : 'What is this calculator used for?'" ></summary>

                            <summary class="cursor-pointer font-medium text-white" x-text="isNepali ? 'के सबै विवरण अनिवार्य रूपमा भर्नुपर्छ?' : 'Do I need to fill all fields?'" ></summary>
                            <p class="mt-2 leading-6 text-slate-400" x-text="isNepali ? 'कम्तीमा सेयर सङ्ख्या (Quantity), सेयरको प्रकार (Share Type), र सम्बन्धित खरिद मूल्य वा बिक्री मूल्य प्रविष्ट गरेपछि मात्र विवरण (Breakdown) हेर्न सकिन्छ।' : 'At minimum, quantity, share type, and the relevant price field are needed to see the breakdown.'"></p>
                        </details>
                        <details class="rounded-xl border border-slate-700/80 bg-slate-800/60 p-4 reveal-on-scroll">
                            <summary class="cursor-pointer font-medium text-white" x-text="isNepali ? 'के यो क्याल्कुलेटर नेपाली सेयर कारोबारका लागि उपयुक्त छ?' : 'Is this calculator suitable for Nepali share transactions?'" ></summary>
                            <p class="mt-2 leading-6 text-slate-400" x-text="isNepali ? 'हो, यो नेपालको सेयर बजारमा प्रचलित शुल्क र नियमहरूलाई आधार मानेर अनुमानित हिसाब प्रदान गर्ने गरी तयार गरिएको हो।' : 'Yes, it is designed with common Nepali market fee assumptions for easier estimation.'"></p>

    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        const backToTopBtn = document.getElementById('backToTopBtn');
        if (backToTopBtn) {
            window.addEventListener('scroll', function () {
                if (window.scrollY > 300) {
                    backToTopBtn.classList.add('show');
                } else {
                    backToTopBtn.classList.remove('show');
                }
            });

            backToTopBtn.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    </script>
    <script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggle = document.getElementById('navToggle');
        const menu = document.getElementById('navMenu');
        if (!toggle || !menu) return;

        toggle.addEventListener('click', function () {
            menu.classList.toggle('hidden');
        });

        menu.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
                menu.classList.add('hidden');
            });
        });
    });
</script>
<script>
    // Stagger entrance animations for elements with .fade-up / .fade-scale
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.fade-up').forEach(function (el, i) {
            el.style.animationDelay = (i * 80) + 'ms';
        });
        document.querySelectorAll('.fade-scale').forEach(function (el, i) {
            el.style.animationDelay = (i * 80 + 40) + 'ms';
        });
        const scrollRevealObserver = ('IntersectionObserver' in window)
            ? new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    entry.target.classList.add('show');
                    observer.unobserve(entry.target);
                });
            }, { threshold: 0.18, rootMargin: '0px 0px -10% 0px' })
            : null;

        document.querySelectorAll('.reveal-on-scroll').forEach(function (el) {
            if (scrollRevealObserver) {
                scrollRevealObserver.observe(el);
            } else {
                el.classList.add('show');
            }
        });    });
</script>

    <script>
        window.addEventListener('load', function () {
            const loader = document.getElementById('pageLoader');
            if (!loader) return;
            document.body.classList.add('loader-complete');
            setTimeout(function () {
                loader.remove();
            }, 650);
        });
    </script>
